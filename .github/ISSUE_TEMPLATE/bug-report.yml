name: Bug report
description: Report an issue with reproducible details and expected behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide reproducible steps.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Who/what is affected and how severe is it?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Fix acceptance criteria
      placeholder: |
        - [ ] Bug condition no longer reproduces
        - [ ] Regression test added where practical
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing expectations
      description: What tests/checks are expected for a fix?
    validations:
      required: true
