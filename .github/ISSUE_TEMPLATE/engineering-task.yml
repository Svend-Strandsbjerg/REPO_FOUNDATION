name: Engineering task
description: Track technical work such as refactors, upgrades, tooling, or process changes.
title: "[Task]: "
labels:
  - chore
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What technical task is needed?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this task needed now?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Define in-scope and out-of-scope items.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing and validation expectations
      description: What verification is required before completion?
    validations:
      required: true

  - type: textarea
    id: docs
    attributes:
      label: Documentation expectations
      description: Which docs must be added/updated?
    validations:
      required: true
